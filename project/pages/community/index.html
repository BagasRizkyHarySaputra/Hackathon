<!DOCTYPE html>
<html lang="en" style="height:100%;overflow:hidden;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SkinGlow — Community" />
  <meta name="theme-color" content="#ffffff" />
  <title>SkinGlow — Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components/global.css" />
  <link rel="stylesheet" href="/assets/css/components/sidebar.css" />
  <link rel="stylesheet" href="/assets/css/components/header.css" />
  <link rel="stylesheet" href="/assets/css/components/home.css" />
  <link rel="stylesheet" href="/assets/css/components/community.css" />
  <link rel="stylesheet" href="/assets/css/components/community-mobile.css" />
</head>
<body style="height:100%;overflow:hidden;background:#FFFFFF;">
  <div class="community-viewport">
    <!-- Blurred gradient background -->
    <div class="loading-bg-blur" aria-hidden="true">
      <div class="loading-bg-blur__blob--pink-tl"></div>
      <div class="loading-bg-blur__blob--blue-tr"></div>
      <div class="loading-bg-blur__blob--dusty-center"></div>
      <div class="loading-bg-blur__blob--blue-bl"></div>
      <div class="loading-bg-blur__blob--pink-br"></div>
      <div class="loading-bg-blur__blob--slate"></div>
    </div>

    <div class="community-app app-layout">
      <div id="sidebar-root" data-active="community"></div>

      <!-- Main Content -->
      <main class="app-main app-main--fixed">
        <div class="home-main__top-bg"></div>

        <header id="header-root" class="home-header"></header>

        <!-- Community Content: channel-section + card stacked vertically on mobile, side-by-side on desktop -->
        <div class="community-content">

          <!-- Channel Avatars (outside community-card on mobile) -->
          <div class="channel-section" id="channel-section">
            <div class="channel-avatar" data-channel="general">
              <div class="channel-avatar__circle"></div>
            </div>
            <span class="channel-label">General</span>

            <div class="channel-avatar" data-channel="skincare">
              <div class="channel-avatar__circle"></div>
            </div>
            <span class="channel-label">Skincare</span>
          </div>

          <!-- Community Card -->
          <section class="community-card">
            <!-- Topic Panel (middle) + Chat Area (right) side-by-side -->
            <div class="community-card__body">
            <div class="topic-panel" id="topic-panel">
              <div class="topic-panel__header">
                <button class="topic-panel__burger" id="topic-burger" aria-label="Toggle topic panel">
                  <span class="topic-panel__burger-line"></span>
                  <span class="topic-panel__burger-line"></span>
                  <span class="topic-panel__burger-line"></span>
                </button>
                <h2 class="topic-panel__title">Topic</h2>
              </div>

              <div class="topic-panel__list" id="topic-list">
                <div class="topic-item topic-item--active" data-topic="acne-fighter">
                  <span class="topic-item__name">#Acne Fighter</span>
                </div>

                <div class="topic-item" data-topic="skincare-review">
                  <span class="topic-item__name">#Review Skincare</span>
                </div>

                <div class="topic-item" data-topic="skincare">
                  <span class="topic-item__name">#Skincare</span>
                </div>
              </div>
            </div>

            <!-- Chat Area (rightmost) -->
            <div class="chat-area">
              <!-- Collapsed topic header (visible when topic panel is closed) -->
              <div class="topic-collapsed-header" id="topic-collapsed-header">
                <button class="topic-panel__burger" id="topic-collapsed-burger" aria-label="Open topic panel">
                  <span class="topic-panel__burger-line"></span>
                  <span class="topic-panel__burger-line"></span>
                  <span class="topic-panel__burger-line"></span>
                </button>
                <h2 class="topic-panel__title">Topic</h2>
              </div>
              <div class="chat-messages-scroll">
                <div class="chat-messages" id="chat-messages">
                </div>
              </div>

              <!-- Input area -->
              <div class="chat-input">
                <div class="chat-input__field">
                  <textarea class="chat-input__textbox" id="chat-input-text" placeholder="Type something..." rows="1"></textarea>
                </div>
                <div class="chat-input__actions">
                  <img src="/assets/icons/nav/face-smile-wink.svg" alt="" class="chat-input__icon" />
                  <img src="/assets/icons/nav/paper-plane.svg" alt="" class="chat-input__icon chat-input__icon--send" id="btn-send" />
                </div>
              </div>
            </div>
          </div>

        </section>
      </div><!-- /community-content -->
      </main>
    </div>
  </div>
  <script src="/config/app.config.js"></script>
  <script src="/assets/js/components/sidebar.js"></script>
  <script src="/assets/js/components/header.js"></script>
  <script src="/assets/js/router.js"></script>
  <script src="/assets/js/community-page.js"></script>
  <script type="module" src="/assets/js/supabase/supabase-client.js"></script>
</body>
</html>
