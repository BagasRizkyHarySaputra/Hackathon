<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SkinGlow — Select your skin type" />
  <meta name="theme-color" content="#95B4C6" />
  <title>SkinGlow — Skin Type</title>

  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components/scan.css" />
</head>
<body>
  <main class="scan-page">
    <div class="scan-bg" aria-hidden="true">
      <div class="scan-bg__bubble scan-bg__bubble--1"></div>
      <div class="scan-bg__bubble scan-bg__bubble--2"></div>
      <div class="scan-bg__bubble scan-bg__bubble--3"></div>
      <div class="scan-bg__bubble scan-bg__bubble--4"></div>
      <div class="scan-bg__bubble scan-bg__bubble--5"></div>
      <div class="scan-bg__bubble scan-bg__bubble--6"></div>
      <div class="scan-bg__bubble scan-bg__bubble--7"></div>
      <div class="scan-bg__bubble scan-bg__bubble--8"></div>
    </div>

    <div class="scan-layout" x-data="createScanComponent()">
      <div class="scan-card">
        <h1 class="scan-card__title">What's Your Skin Type?</h1>
      
        <div class="scan-card__options">
          <template x-for="type in skinTypes" :key="type.id">
            <button
              class="scan-type-btn"
              :class="{ 'scan-type-btn--selected': selectedType === type.id }"
              @click="selectType(type.id)"
              type="button"
            >
              <span x-text="type.label"></span>
            </button>
          </template>
        </div>
      
        <div class="scan-card__action">
          <button
            class="scan-confirm-btn"
            @click="confirmSelection()"
            :disabled="!selectedType"
            type="button"
          >
            Confirm
          </button>
        </div>
      
        <div class="scan-mascot" aria-hidden="true">
          <img 
            src="/assets/icons/water-drop-mascot.svg" 
            alt="Mascot" 
            class="scan-mascot__img"
          />
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/assets/js/supabase/supabase-client.js"></script>
  <script src="/config/app.config.js"></script>
  <script defer src="/assets/js/vendor/alpine.min.js"></script>
  <script src="/assets/js/vendor/htmx.min.js"></script>
  <script src="/assets/js/alpine/app.js"></script>
  <script src="/assets/js/alpine/stores/ui.store.js"></script>
  <script src="/assets/js/alpine/stores/auth.store.js"></script>
  <script src="/assets/js/alpine/components/scan.js"></script>
  <script src="/assets/js/htmx/config.js"></script>
  <script src="/assets/js/htmx/interceptors.js"></script>
  <script src="/assets/js/pwa/sw-register.js"></script>
</body>
</html>
