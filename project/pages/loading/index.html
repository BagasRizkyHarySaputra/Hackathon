<!--
  ============================================================
  FILE: pages/loading/index.html
  ============================================================
  FEATURE: Loading Page — Full Page Entry
  PURPOSE:
    Complete HTML page for the skin analysis loading screen.
    This page is navigated to after the user submits their photo.
    Uses Alpine.js for reactive UI and HTMX for server communication.
  HTMX CONTRACT:
    - On load: fetches partial from GET /api/loading/partial
    - Polls: GET /api/analysis/status (Phase 2)
  ALPINE DEPENDENCIES:
    - createLoadingComponent() from assets/js/alpine/components/loading.js
  ============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SkinGlow — Analyzing your skin glow..." />
  <meta name="theme-color" content="#95B4C6" />
  <title>SkinGlow — Analyzing...</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components/loading.css" />
</head>
<body>
  <main
    class="loading-page"
    id="loading-container"
    hx-get="/api/loading/partial"
    hx-trigger="load"
    hx-swap="innerHTML"
    hx-target="#loading-container"
  >
    <!-- Fallback content shown until HTMX partial loads -->
    <div class="loading-bg-blur" aria-hidden="true">
      <div class="loading-bg-blur__blob--pink-tl"></div>
      <div class="loading-bg-blur__blob--blue-tr"></div>
      <div class="loading-bg-blur__blob--dusty-center"></div>
      <div class="loading-bg-blur__blob--blue-bl"></div>
      <div class="loading-bg-blur__blob--pink-br"></div>
      <div class="loading-bg-blur__blob--slate"></div>
    </div>

    <div class="loading-layout">
      <!-- 3D SVG Mascot -->
      <div class="loading-mascot" aria-hidden="true">
        <img
          class="loading-mascot__svg"
          src="/assets/icons/water-drop-mascot.svg"
          alt=""
          width="180"
          height="180"
          loading="eager"
        />
      </div>

      <div class="loading-content" x-data="createLoadingComponent()" @beforeunload.window="destroy()">
        <div class="loading-heading-wrapper">
          <h1 class="loading-heading" x-html="statusMessage.replace('\n', '<br>')"></h1>
        </div>
        <p class="loading-subtext" x-text="subtext"></p>
        <div class="loading-progress-wrapper">
          <div
            class="loading-progress-track"
            role="progressbar"
            :aria-valuenow="displayProgress"
            aria-valuemin="0"
            aria-valuemax="100"
            :aria-label="'Analysis progress: ' + displayProgress + '%'"
          >
            <div class="loading-progress-fill" :style="'width: ' + progress + '%'"></div>
          </div>
        </div>
        <div class="loading-percentage">
          <svg class="loading-percentage__icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" x-show="isLoading">
            <path d="M12 2C6.48 2 2 6.48 2 12h2c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8v2c5.52 0 10-4.48 10-10S17.52 2 12 2z"/>
          </svg>
          <svg class="loading-percentage__icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" x-show="isComplete" x-cloak style="animation: none; fill: #4CAF50;">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
          </svg>
          <span class="loading-percentage__text" x-text="displayProgress + '%'"></span>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts — Order matters -->
  <script src="/config/app.config.js"></script>
  <script defer src="/assets/js/vendor/alpine.min.js"></script>
  <script src="/assets/js/vendor/htmx.min.js"></script>
  <script src="/assets/js/alpine/app.js"></script>
  <script src="/assets/js/alpine/stores/ui.store.js"></script>
  <script src="/assets/js/alpine/stores/auth.store.js"></script>
  <script src="/assets/js/alpine/components/loading.js"></script>
  <script src="/assets/js/htmx/config.js"></script>
  <script src="/assets/js/htmx/interceptors.js"></script>
  <script src="/assets/js/pwa/sw-register.js"></script>
<script src="/assets/js/router.js"></script>
</body>
</html>
