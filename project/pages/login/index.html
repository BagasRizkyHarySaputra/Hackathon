<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SkinGlow — Sign in to your account" />
  <meta name="theme-color" content="#eef2fa" />
  <title>SkinGlow — Sign In</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components/loading.css" />
  <link rel="stylesheet" href="/assets/css/components/login.css" />
</head>
<body>
  <main class="app-main app-main--login-page" id="login-container">
    <div class="login-layout" x-data="createLoginComponent()">
      <div class="login-mascot" aria-hidden="true">
        <img class="login-mascot__svg" src="/assets/icons/water-drop-mascot.svg" alt="SkinGlow mascot"/>
      </div>

      <div class="login-card-area">
        <div class="login-card-container" :data-tab="activeTab" :anim-direction="animDirection">
          <img class="login-card-box login-card-box--signin" src="/assets/shape/Sign-In.svg" alt="" aria-hidden="true" />
          <img class="login-card-box login-card-box--signup" src="/assets/shape/Sign-up.svg" alt="" aria-hidden="true" />

          <div class="login-card-content">
            <div class="login-tabs">
              <button class="login-tab" :class="{ 'login-tab--active': activeTab === 'signin' }" type="button" @click="switchTab('signin')">Sign In</button>
              <button class="login-tab" :class="{ 'login-tab--active': activeTab === 'signup' }" type="button" @click="switchTab('signup')">Sign Up</button>
            </div>
            <div class="login-social">
              <button class="login-social__btn" type="button" aria-label="Google">
                <img src="/assets/icons/artikel/google-logo.svg" alt="" />
              </button>
              <button class="login-social__btn" type="button" aria-label="Facebook" @click="handleSocialLogin('facebook')">
                <img src="/assets/icons/artikel/Facebook-Icons.svg" alt="" />
              </button>
            </div>
            <div class="login-divider">
              <div class="login-divider__line"></div>
              <span class="login-divider__text">Or</span>
              <div class="login-divider__line"></div>
            </div>

            <!-- Sign In Form -->
            <form id="login-form" class="login-form" x-show="activeTab === 'signin'" @submit.prevent="handleSubmit">
              <div class="login-input-group">
                <span class="login-input-group__icon">
                  <img src="/assets/icons/artikel/Email.svg" alt="" />
                </span>
                <input class="login-input" type="email" x-model="email" placeholder="Email" autocomplete="email" />
              </div>
              <div class="login-input-group">
                <span class="login-input-group__icon">
                  <img src="/assets/icons/artikel/Lock.svg" alt="" />
                </span>
                <input class="login-input" :type="passwordType" x-model="password" placeholder="Password" autocomplete="current-password" />
                <button class="login-input-group__toggle" type="button" @click="togglePassword">
                  <img x-show="!showPassword" src="/assets/icons/artikel/eye.svg" alt="" />
                  <img x-show="showPassword" src="/assets/icons/artikel/eye.svg" alt="" />
                </button>
              </div>
              <div class="login-error" x-text="errorMessage" x-show="errorMessage"></div>
              <p class="login-account-link">Don't have an account? <a href="#" @click.prevent="switchTab('signup')">Sign Up</a></p>
            </form>

            <!-- Sign Up Form -->
            <form id="signup-form" class="login-form" x-show="activeTab === 'signup'" @submit.prevent="handleSubmit">
              <div class="login-input-group">
                <span class="login-input-group__icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                <input class="login-input" type="text" x-model="fullName" placeholder="Full Name" autocomplete="name" />
              </div>
              <div class="login-input-group">
                <span class="login-input-group__icon">
                  <img src="/assets/icons/artikel/Email.svg" alt="" />
                </span>
                <input class="login-input" type="email" x-model="email" placeholder="Email" autocomplete="email" />
              </div>
              <div class="login-input-group">
                <span class="login-input-group__icon">
                  <img src="/assets/icons/artikel/Lock.svg" alt="" />
                </span>
                <input class="login-input" :type="passwordType" x-model="password" placeholder="Password" autocomplete="new-password" />
                <button class="login-input-group__toggle" type="button" @click="togglePassword">
                  <img x-show="!showPassword" src="/assets/icons/artikel/eye.svg" alt="" />
                  <img x-show="showPassword" src="/assets/icons/artikel/eye.svg" alt="" />
                </button>
              </div>
              <div class="login-input-group">
                <span class="login-input-group__icon">
                  <img src="/assets/icons/artikel/Lock.svg" alt="" />
                </span>
                <input class="login-input" :type="confirmPasswordType" x-model="confirmPassword" placeholder="Confirm Password" autocomplete="new-password" />
                <button class="login-input-group__toggle" type="button" @click="toggleConfirmPassword">
                  <img x-show="!showConfirmPassword" src="/assets/icons/artikel/eye.svg" alt="" />
                  <img x-show="showConfirmPassword" src="/assets/icons/artikel/eye.svg" alt="" />
                </button>
              </div>
              <div class="login-error" x-text="errorMessage" x-show="errorMessage"></div>
              <p class="login-account-link">Already have an account? <a href="#" @click.prevent="switchTab('signin')">Sign In</a></p>
            </form>
          </div>
        </div>
        <div class="login-btn-wrap">
          <button class="login-btn" type="button" @click="handleSubmit" x-text="activeTab === 'signin' ? 'Sign In' : 'Sign Up'" :class="{ 'login-btn--loading': isSubmitting }"></button>
        </div>
      </div>
    </div>
  </main>

  <script src="/config/app.config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  <script src="/assets/js/alpine/app.js"></script>
  <script src="/assets/js/alpine/stores/ui.store.js"></script>
  <script src="/assets/js/alpine/stores/auth.store.js"></script>
  <script src="/assets/js/alpine/components/login.js"></script>
  <script src="/assets/js/htmx/config.js"></script>
  <script src="/assets/js/htmx/interceptors.js"></script>
  <script src="/assets/js/pwa/sw-register.js"></script>
<script src="/assets/js/router.js"></script>
</body>
</html>
