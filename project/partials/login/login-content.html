<!--
  ============================================================
  FILE: partials/login/login-content.html
  ============================================================
  Login Content — HTMX Partial Response
  Scan 4 Style: white/blue bokeh, SVG shape cards, two-column
-->

<!-- Bokeh Background -->
<div class="login-bg" aria-hidden="true">
  <div class="login-bg__blob login-bg__blob--1"></div>
  <div class="login-bg__blob login-bg__blob--2"></div>
  <div class="login-bg__blob login-bg__blob--3"></div>
  <div class="login-bg__blob login-bg__blob--4"></div>
  <div class="login-bg__blob login-bg__blob--5"></div>
</div>

<!-- Two-Column Layout -->
<div class="login-layout" x-data="createLoginComponent()">

  <!-- Left: Mascot -->
  <div class="login-mascot" aria-hidden="true">
    <img
      class="login-mascot__svg"
      src="/assets/icons/water-drop-mascot.svg"
      alt="SkinGlow mascot"
      loading="eager"
    />
  </div>

  <!-- Right: Card Area -->
  <div class="login-card-area">

    <!-- Card Container with SVG shapes -->
    <div class="login-card-container" :data-tab="activeTab">
      <!-- SVG Shape: Sign In (front) -->
      <img
        class="login-card-svg login-card-svg--signin"
        src="/assets/shape/sign-in.png"
        alt=""
        aria-hidden="true"
      />
      <!-- SVG Shape: Sign Up (behind) -->
      <img
        class="login-card-svg login-card-svg--signup"
        src="/assets/shape/sign-up.png"
        alt=""
        aria-hidden="true"
      />

      <!-- Card Content (overlay) -->
      <div class="login-card-content">

        <!-- Tabs -->
        <div class="login-tabs">
          <button
            class="login-tab"
            :class="{ 'login-tab--active': activeTab === 'signin' }"
            @click="switchTab('signin')"
            type="button"
          >Sign In</button>
          <button
            class="login-tab"
            :class="{ 'login-tab--active': activeTab === 'signup' }"
            @click="switchTab('signup')"
            type="button"
          >Sign Up</button>
        </div>

        <!-- Social Login -->
        <div class="login-social">
          <button class="login-social__btn" @click="handleSocialLogin('google')" type="button" aria-label="Sign in with Google">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
              <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
              <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
              <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
            </svg>
          </button>
          <button class="login-social__btn" @click="handleSocialLogin('facebook')" type="button" aria-label="Sign in with Facebook">
            <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
              <circle cx="22" cy="22" r="22" fill="#0866FF"/>
              <path d="M28.01 23.5h-3.51V36h-5.5V23.5h-2.5V18.5h2.5v-3c0-2.5 1.2-6 5.8-6h4.2v5h-2.8c-.5 0-1.2.3-1.2 1.3v2.7h4.1l-.6 5z" fill="#FFFFFF"/>
            </svg>
          </button>
        </div>

        <!-- Divider -->
        <div class="login-divider">
          <div class="login-divider__line"></div>
          <span class="login-divider__text">Or</span>
          <div class="login-divider__line"></div>
        </div>

        <!-- Login Form -->
        <form class="login-form" @submit="handleSubmit($event)">

          <!-- Email -->
          <div class="login-input-group">
            <span class="login-input-group__icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
              </svg>
            </span>
            <input class="login-input" type="email" placeholder="Email" x-model="email" autocomplete="email" />
          </div>

          <!-- Password -->
          <div class="login-input-group">
            <span class="login-input-group__icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/>
              </svg>
            </span>
            <input class="login-input" :type="passwordType" placeholder="Password" x-model="password" autocomplete="current-password" style="padding-right: 48px;" />
            <button class="login-input-group__toggle" @click.prevent="togglePassword()" type="button" :aria-label="showPassword ? 'Hide password' : 'Show password'">
              <svg x-show="!showPassword" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 0 0 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
              </svg>
              <svg x-show="showPassword" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" x-cloak>
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
              </svg>
            </button>
          </div>

          <!-- Confirm Password (Sign Up only) -->
          <div class="login-input-group" x-show="activeTab === 'signup'" x-transition>
            <span class="login-input-group__icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/>
              </svg>
            </span>
            <input class="login-input" :type="confirmPasswordType" placeholder="Confirm Password" x-model="confirmPassword" autocomplete="new-password" style="padding-right: 48px;" />
            <button class="login-input-group__toggle" @click.prevent="toggleConfirmPassword()" type="button" :aria-label="showConfirmPassword ? 'Hide password' : 'Show password'">
              <svg x-show="!showConfirmPassword" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 0 0 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
              </svg>
              <svg x-show="showConfirmPassword" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" x-cloak>
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
              </svg>
            </button>
          </div>

          <!-- Error -->
          <p class="login-error" x-text="errorMessage" x-show="errorMessage"></p>

          <!-- Account Link -->
          <div class="login-account-link">
            <span x-show="activeTab === 'signin'">
              Don't have an account?
              <a href="#" @click.prevent="switchTab('signup')">Sign Up</a>
            </span>
            <span x-show="activeTab === 'signup'" x-cloak>
              Already have an account?
              <a href="#" @click.prevent="switchTab('signin')">Sign In</a>
            </span>
          </div>

        </form>
      </div>
    </div>

    <!-- Button (pill capsule) -->
    <div class="login-btn-wrap">
      <button
        class="login-btn"
        :class="{ 'login-btn--loading': isSubmitting }"
        type="submit"
        :disabled="isSubmitting"
        @click="handleSubmit($event)"
      >
        <span x-show="!isSubmitting" x-text="activeTab === 'signin' ? 'Sign In' : 'Sign Up'"></span>
        <span x-show="isSubmitting" x-cloak>
          <span x-text="activeTab === 'signin' ? 'Signing In...' : 'Creating Account...'"></span>
        </span>
      </button>
    </div>
  </div>
</div>
