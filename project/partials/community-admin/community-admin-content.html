  ============================================================
  FILE: partials/community-admin/community-admin-content.html
  ============================================================
  FEATURE: Community Admin Page — HTMX Partial
  PURPOSE:
    HTML fragment for the community admin page with channel
    management, topic panel with add button, and chat area.
  HTMX CONTRACT:
    - Served via GET /api/community-admin/partial
  ============================================================
-->
<div class="community-viewport">
  <div class="loading-bg-blur" aria-hidden="true">
    <div class="loading-bg-blur__blob--pink-tl"></div>
    <div class="loading-bg-blur__blob--blue-tr"></div>
    <div class="loading-bg-blur__blob--dusty-center"></div>
    <div class="loading-bg-blur__blob--blue-bl"></div>
    <div class="loading-bg-blur__blob--pink-br"></div>
    <div class="loading-bg-blur__blob--slate"></div>
  </div>

  <div class="community-app">
    <div id="sidebar-root" data-active="community"></div>

    <main class="community-main">
      <div class="home-main__top-bg"></div>

      <header id="header-root" class="home-header"></header>

      <section class="community-card">

        <div class="channel-section">
          <div class="channel-avatar">
            <div class="channel-avatar__circle"></div>
          </div>
          <span class="channel-label">Channel?</span>

          <div class="channel-avatar">
            <div class="channel-avatar__circle"></div>
          </div>
          <span class="channel-label">Channel?</span>
        </div>

        <div class="topic-panel">
          <div class="topic-panel__header">
            <h2 class="topic-panel__title">Topic</h2>
            <button class="topic-panel__add-btn" aria-label="Add topic">
              <img src="/assets/icons/nav/add.svg" alt="" class="topic-panel__add-icon" />
            </button>
          </div>

          <div class="topic-item">
            <span class="topic-item__name">#Acne Fighter</span>
          </div>

          <div class="topic-item">
            <span class="topic-item__name">#Review Skincare</span>
          </div>

          <div class="topic-item">
            <span class="topic-item__name">#Skincare</span>
          </div>
        </div>

        <div class="chat-area">
          <div class="chat-messages">
            <div class="chat-msg-row chat-msg-row--received">
              <div class="chat-avatar">
                <div class="chat-avatar__circle"></div>
              </div>
              <div class="chat-bubble chat-bubble--received">
                <p class="chat-bubble__text">Hadirin sekalian, dimohon untuk selalu menjaga kesehatan kulit wajah masing-masing ya.</p>
              </div>
            </div>

            <div class="chat-msg-row chat-msg-row--received">
              <div class="chat-avatar">
                <div class="chat-avatar__circle"></div>
              </div>
              <div class="chat-bubble chat-bubble--received">
                <p class="chat-bubble__text">Jangan lupa untuk selalu menggunakan sunscreen setiap hari.</p>
              </div>
            </div>

            <div class="chat-msg-row chat-msg-row--sent">
              <div class="chat-bubble chat-bubble--sent">
                <p class="chat-bubble__text">Noted kak, makasih infonya.</p>
              </div>
              <div class="chat-avatar">
                <div class="chat-avatar__circle chat-avatar__circle--self"></div>
              </div>
            </div>
          </div>

          <div class="chat-input">
            <div class="chat-input__field">
              <span class="chat-input__placeholder">Type something...</span>
            </div>
            <div class="chat-input__actions">
              <img src="/assets/icons/nav/face-smile-wink.svg" alt="" class="chat-input__icon" />
              <img src="/assets/icons/nav/paper-plane.svg" alt="" class="chat-input__icon chat-input__icon--send" />
            </div>
          </div>
        </div>

      </section>
    </main>
  </div>
</div>
