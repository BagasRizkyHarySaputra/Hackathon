<!--
  ============================================================
  FILE: offline.html
  ============================================================
  FEATURE: PWA Offline Fallback Page
  PURPOSE:
    Displayed when the user is offline and the requested page
    is not available in the cache. Shows a friendly offline message
    and auto-reloads when connectivity is restored.
  ALPINE DEPENDENCIES: None (standalone page)
  ============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#95B4C6" />
  <title>SkinGlow — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #FFFFFF;
      color: #535F73;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2.34vh 1.67vw;
      text-align: center;
    }
    .offline-container { max-width: 400px; }
    .offline-icon {
      width: 5.56vw; height: 5.56vw;
      background: #FFE3E2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2.34vh;
    }
    .offline-icon svg { width: 2.78vw; height: 2.78vw; fill: #95B4C6; }
    h1 { font-size: 1.67vw; font-weight: 600; color: #0B1939; margin-bottom: 1.17vh; }
    p { font-size: 1.11vw; color: #44474C; line-height: 1.5; margin-bottom: 2.34vh; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.56vw;
      padding: 0.78vh 1.11vw;
      background: #FFE3E2;
      border-radius: 1.39vw;
      font-size: 0.97vw;
      color: #535F73;
    }
    .status-dot {
      width: 0.56vw; height: 0.56vw;
      background: #E4D8DC;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    .status-dot.online { background: #4CAF50; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24"><path d="M24 8.98C20.93 5.9 16.69 4 12 4S3.07 5.9 0 8.98l12 13.02L24 8.98zM12 6c3.31 0 6.31 1.34 8.49 3.52L12 18.49 3.51 9.52C5.69 7.34 8.69 6 12 6z"/></svg>
    </div>
    <h1>You're Offline</h1>
    <p>It seems you've lost your internet connection. SkinGlow needs a connection to analyze your skin.</p>
    <div class="status-badge">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Checking connection...</span>
    </div>
  </div>

  <script>
    /**
     * Monitors network connectivity and auto-reloads when online.
     * Updates the status badge to reflect current connection state.
     */
    function checkConnectivity() {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');

      if (navigator.onLine) {
        dot.classList.add('online');
        text.textContent = 'Back online! Reloading...';
        setTimeout(() => window.location.reload(), 1500);
      } else {
        dot.classList.remove('online');
        text.textContent = 'Waiting for connection...';
      }
    }

    window.addEventListener('online', checkConnectivity);
    window.addEventListener('offline', checkConnectivity);
    checkConnectivity();
  </script>
</body>
</html>
